version: "3.9"

services:
  # -------------------------------------------------
  #  1️⃣ SQL Server (Express) – llamado mssql-server
  # -------------------------------------------------
  mssql:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: mssql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "14333:1433"          # host 14333 → contenedor 1433
    volumes:
      - mssql-data:/var/opt/mssql   # <-- aquí usamos el volumen
    healthcheck:
      test: ["CMD",
             "/opt/mssql-tools/bin/sqlcmd",
             "-S","192.168.125.52",
             "-U","SA",
             "-P","${SA_PASSWORD}",
             "-Q","SELECT 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # -------------------------------------------------
  #  2️⃣ API (Node/Express)
  # -------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api
    env_file:
      - ./.env                     # carga todas las variables (DB_*, JWT_*, …)
    environment:
      - NODE_ENV=development
      - PORT=${PORT}             # 15000
    depends_on:
      mssql:
        condition: service_healthy   # espera a que el healthcheck sea OK
    ports:
      - "${PORT}:${PORT}"

  # -------------------------------------------------
  #  3️⃣ Frontend (React) – Nginx
  # -------------------------------------------------
  front:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: front
    env_file:
      - ./.env                     # solo variables que empiezan con REACT_APP_ / VITE_
    ports:
      - "${F_PORT}:80"               # host 13000 → Nginx (80)
    depends_on:
      - api

# ----------------- VOLUMES -----------------
volumes:
  mssql-data:                    # <--- definición obligatoria
