

services:
  db:
    build:
    # ruta donde está el Dockerfile anterior
      context: ./database          
      dockerfile: Dockerfile
    container_name: sugerencias-db
    env_file:
      - ./.env               # contiene SA_PASSWORD, DB_*, …
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
    ports:
      - "${PORT}:1433"         # puerto externo opcional
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL",
            "/opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P \"$SA_PASSWORD\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30            # 30 × 10 s = 5 min (cubre arranques lentos)
      start_period: 60s
    restart: unless-stopped

  # -----------------------------------------------------------------
  # 2️⃣  Backend (Node.js) – usa tu código db.js
  # -----------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sugerencias-backend
    env_file:
      - ./.env                     # <-- el mismo .env que el db
    environment:
      # Sobrescribimos solo lo que necesite el backend:
      DB_SERVER: ${DB_SERVER}      # “db” – esto es redundante, pero lo dejamos claro
      DB_PORT: ${PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ENCRYPT: ${DB_ENCRYPT}
      DB_TRUST_SERVER_CERTIFICATE: ${DB_TRUST_SERVER_CERTIFICATE}
      # El resto de variables del .env (JWT, CORS, etc.) ya están cargadas
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT}:${PORT}"              
      # puerto expuesto del backend ( env PORT)
    volumes:
      - ./backend:/app:cached
      - backend_node_modules:/app/node_modules
    # Tu ENTRYPOINT o CMD del Dockerfile debe lanzar `node src/server.js`
    # (o el archivo que arranque tu Express)
    healthcheck:
      test: ["CMD-SHELL",
             "/opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P \"${SA_PASSWORD}\" -Q \"SELECT 1\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # -----------------------------------------------------------------
  # 3️⃣  Frontend (React + Nginx)
  # -----------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api/
        REACT_APP_WS_URL: /ws/
        REACT_APP_USE_AZURE_AUTH: "false"
    container_name: sugerencias-frontend
    env_file:
      - ./frontend/.env
    ports:
      - "13000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mssql_data:
  backend_node_modules:
