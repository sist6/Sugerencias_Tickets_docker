server {
    listen 13000;
    server_name 192.168.125.52;
    
    root /usr/share/nginx/html;
    index index.html;

    # Servir archivos estáticos y SPA routing - CORREGIDO
    location / {
        try_files $uri $uri/ =404;
    }
    
    # Manejo especial para el SPA - AÑADIDO
    location / {
        try_files $uri $uri/ @spa;
    }
    
    location @spa {
        rewrite ^.*$ /index.html last;
    }

    # Proxy al backend API
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://192.168.125.52:15000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket
    location /ws {
        proxy_pass http://192.168.125.52:15000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Cache estático
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
